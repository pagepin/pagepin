        <path d="M 215 188 L 264.5 188 Q 272.5 188 272.5 180 L 272.5 164 Q 272.5 156 280.5 156 L 330 156" class="a-emphasis" stroke-width="1.8" marker-end="url(#arrowhead-emphasis)"/>
        <path d="M 427.5 120 L 427.0952313472241 85.99943316682538 Q 427 78 419 78 L 135 78 Q 127 78 127.0555542160121 85.99980710574219 L 127.5 150" class="a-dashed" stroke-width="1.5" marker-end="url(#arrowhead-dashed)"/>
