        <path d="M 427.5 192 L 697 192 Q 705 192 705 200 L 705 292 Q 705 300 713 300 L 982.5 300" class="a-default" stroke-width="1.5" marker-end="url(#arrowhead)"/>
        <path d="M 525 336 L 890 336" class="a-default" stroke-width="1.5" marker-end="url(#arrowhead)"/>

        <!-- Components -->
        <rect x="40" y="150" width="175" height="76" rx="6" class="c-mask"/>
