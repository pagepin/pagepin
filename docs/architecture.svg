        <text x="127.5" y="186" class="t-primary" font-size="11" font-weight="600" text-anchor="middle">Coding agent</text>
        <text x="127.5" y="202" class="t-muted" font-size="9" text-anchor="middle">skill · plugin · /skill.md</text>
        <text x="127.5" y="218" class="t-external" font-size="7" text-anchor="middle">device-login → pp_ token</text>

        <rect x="40" y="440" width="175" height="74" rx="6" class="c-mask"/>
